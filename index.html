<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Broker Research OS · Research Desk</title>
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <!-- Anti-FOUC: resolve the theme synchronously before React mounts so the
         canvas + text render correctly on first paint. Must mirror the logic
         in src/app/ThemeContext.tsx::resolveInitialTheme(). -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('research-theme');
          var prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches === false;
          var theme = (saved === 'light' || saved === 'dark')
            ? saved
            : (prefersLight ? 'light' : 'dark');
          if (theme === 'dark') document.documentElement.classList.add('dark');
        } catch (e) { document.documentElement.classList.add('dark'); }
      })();
    </script>
  </head>
  <body class="bg-ink-950 text-slate-100 font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
